<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ILYB – Terms &amp; Conditions</title>
  <style>
    :root {
      --bg: #fff2f7;
      --surface: #fff0f5;
      --card: #ffd9e6;
      --text: #402633;
      --text-secondary: #805966;
      --primary: #d93359;
      --button-red: #e64066;
    }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px 16px; padding-left: max(16px, env(safe-area-inset-left)); padding-right: max(16px, env(safe-area-inset-right)); line-height: 1.6; }
    .lang-bar { display: flex; flex-wrap: nowrap; gap: 6px; margin-bottom: 16px; padding: 10px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; width: 100%; }
    .lang-bar::-webkit-scrollbar { display: none; }
    .lang-bar button { flex-shrink: 0; padding: 8px 12px; border: 1px solid rgba(64,38,51,0.2); border-radius: 12px; background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; }
    .lang-bar button:hover, .lang-bar button.active { background: var(--button-red); color: #fff; border-color: var(--button-red); }
    @media (max-width: 430px) {
      .lang-bar button { padding: 6px 10px; font-size: 12px; }
    }
    .content { max-width: 720px; margin: 0 auto; padding: 16px; padding-bottom: env(safe-area-inset-bottom, 16px); background: var(--surface); border-radius: 16px; box-shadow: 0 1px 3px rgba(64,38,51,0.08); }
    .content h1 { font-size: 1.75rem; margin-top: 0; color: var(--text); }
    .content h2 { font-size: 1.2rem; margin-top: 1.5em; color: var(--text); }
    .content p { margin: 0.75em 0; color: var(--text); }
    .content ul { margin: 0.75em 0; padding-left: 1.5em; color: var(--text); }
    .content a { color: var(--primary); text-decoration: none; }
    .content a:hover { text-decoration: underline; }
    #content [data-lang] { display: none; }
    #content [data-lang].on { display: block; }
  </style>
</head>
<body>
  <div class="lang-bar" id="langBar">
    <button type="button" data-lang="en">English</button>
    <button type="button" data-lang="uk">Українська</button>
    <button type="button" data-lang="es">Español</button>
    <button type="button" data-lang="ca">Valenciano</button>
    <button type="button" data-lang="it">Italiano</button>
    <button type="button" data-lang="fr">Français</button>
    <button type="button" data-lang="pt">Português</button>
    <button type="button" data-lang="de">Deutsch</button>
    <button type="button" data-lang="ru">Русский</button>
    <button type="button" data-lang="zh-Hans">简体中文</button>
  </div>
  <div class="content" id="content"></div>
  <script>
    var TEXTS = {};
    var langCodes = ['en','uk','ru','es','it','fr','pt','ca','zh-Hans','de'];
    function getLang() {
      var p = new URLSearchParams(location.search);
      var l = p.get('lang') || 'en';
      return langCodes.indexOf(l) >= 0 ? l : 'en';
    }
    function setLang(code) {
      try {
        var url = new URL(location.href);
        url.searchParams.set('lang', code);
        history.replaceState(null, '', url);
      } catch (e) {}
      document.querySelectorAll('#content [data-lang]').forEach(function(el) { el.classList.toggle('on', el.getAttribute('data-lang') === code); });
      document.querySelectorAll('#langBar button').forEach(function(btn) { btn.classList.toggle('active', btn.getAttribute('data-lang') === code); });
    }
    function init() {
      var bar = document.getElementById('langBar');
      var container = document.getElementById('content');
      if (!bar || !container) return;
      bar.querySelectorAll('button').forEach(function(btn) {
        btn.onclick = function() { setLang(btn.getAttribute('data-lang')); };
      });
      var current = getLang();
      try {
        Object.keys(TEXTS).forEach(function(code) {
          var div = document.createElement('div');
          div.setAttribute('data-lang', code);
          div.className = code === current ? 'on' : '';
          div.innerHTML = TEXTS[code];
          container.appendChild(div);
        });
      } catch (e) {}
      setLang(current);
    }
  </script>
  <script src="content.js"></script>
  <script>
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
